name: Build release APK

# Manual trigger only. Builds the optimized (R8 minified + resource-shrunk) release APK
# and uploads it as a workflow artifact.
#
# Signing (optional): to get an installable, properly-signed APK, add these repository
# secrets (Settings > Secrets and variables > Actions). Without them the build still
# succeeds and produces app-release-unsigned.apk.
#   KEYSTORE_BASE64    - your release keystore, base64-encoded (`base64 -w0 my.keystore`)
#   KEYSTORE_PASSWORD  - keystore password
#   KEY_ALIAS          - key alias
#   KEY_PASSWORD       - key password

on:
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a GitHub Release

concurrency:
  group: release-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Secrets are exposed as env vars here (the `secrets` context can't be used in step `if:`).
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      RUTA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      RUTA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      RUTA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Caches ~/.gradle (dependencies + build cache + wrapper dist) across runs for fast builds.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing key
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "RUTA_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Signing enabled."
          else
            echo "No signing secrets set; building an unsigned release APK."
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --build-cache --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruta-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      # Publish the APK as a GitHub Release so it shows under the repo's Releases tab.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-${{ github.run_number }}"
          gh release create "$TAG" app/build/outputs/apk/release/*.apk \
            --title "ruta build ${{ github.run_number }}" \
            --notes "Automated release build from commit ${{ github.sha }}." \
            --target "${{ github.sha }}"
