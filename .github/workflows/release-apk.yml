name: Build release APK

# Manual trigger only. Builds the optimized (R8 minified + resource-shrunk) release APK
# and uploads it as a workflow artifact.
#
# Signing (optional): to get an installable, properly-signed APK, add these repository
# secrets (Settings > Secrets and variables > Actions). Without them the build still
# succeeds and produces app-release-unsigned.apk.
#   KEYSTORE_BASE64    - your release keystore, base64-encoded (`base64 -w0 my.keystore`)
#   KEYSTORE_PASSWORD  - keystore password
#   KEY_ALIAS          - key alias
#   KEY_PASSWORD       - key password

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Play versionCode (integer). Must be higher than the highest code already uploaded to Play. Leave blank to use today's UTC date as YYYYMMDD."
        required: false
        type: string

permissions:
  contents: write   # needed to publish a GitHub Release

concurrency:
  group: release-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Secrets are exposed as env vars here (the `secrets` context can't be used in step `if:`).
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      RUTA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      RUTA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      RUTA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Monotonic versionCode for Play (must strictly increase across uploads). The run number is
      # useless here — it resets low (e.g. 12) and Play rejects anything <= the last upload. Default
      # to today's UTC date as YYYYMMDD (e.g. 20260627), which always beats earlier date-coded
      # uploads and auto-bumps daily. Pass version_code to override (e.g. a second upload same day).
      - name: Resolve versionCode
        run: |
          if [ -n "${{ inputs.version_code }}" ]; then
            VC="${{ inputs.version_code }}"
          else
            VC="$(date -u +%Y%m%d)"
          fi
          echo "RUTA_VERSION_CODE=$VC" >> "$GITHUB_ENV"
          echo "Using versionCode $VC"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Caches ~/.gradle (dependencies + build cache + wrapper dist) across runs for fast builds.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing key
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "RUTA_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Signing enabled."
          else
            echo "No signing secrets set; building an unsigned release APK."
          fi

      # APK for the GitHub Release / F-Droid / sideloading; AAB for an eventual Play upload.
      - name: Build release APK + AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --build-cache --stacktrace

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ruta-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14

      # Publish the APK as a GitHub Release (the .aab is for Play upload only).
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-${{ github.run_number }}"
          gh release create "$TAG" \
            app/build/outputs/apk/release/*.apk \
            app/build/outputs/bundle/release/*.aab \
            --title "ruta build ${{ github.run_number }} (versionCode ${RUTA_VERSION_CODE})" \
            --notes "Automated release build from commit ${{ github.sha }}. versionCode ${RUTA_VERSION_CODE}. The .aab is for Play upload; the .apk is for sideloading." \
            --target "${{ github.sha }}"
